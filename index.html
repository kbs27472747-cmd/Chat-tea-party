<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파티 심리 테스트</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f0ebe3;
            --point-red: #ff4d4d;
            --point-green: #2d5a27;
            --point-yellow: #ffcc00;
            --insta-color: #E1306C;
            --text-color: #333;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        #test-container {
            background: white;
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 10px 10px 0px var(--point-green);
            border: 3px solid #000;
            text-align: center;
        }

        .title {
            font-size: 1.8rem;
            margin-bottom: 10px;
            color: var(--point-red);
            word-break: keep-all;
        }

        .brand-label {
            font-size: 1.1rem;
            color: var(--point-green);
            font-weight: 800;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1.1rem;
            margin-bottom: 30px;
            line-height: 1.5;
            word-break: keep-all;
        }

        .answer-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: 2px solid #000;
            background: #fff;
            cursor: pointer;
            font-size: 1rem;
            border-radius: 10px;
        }

        .answer-btn:hover { background: var(--point-yellow); }

        .result-tea { font-size: 2rem; color: var(--point-green); margin: 15px 0; font-weight: 800; }
        .result-desc { line-height: 1.6; margin-bottom: 20px; background: #f9f9f9; padding: 20px; border-radius: 10px; text-align: left; }

        .event-announcement {
            background: var(--point-yellow);
            border: 2px dashed var(--point-red);
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 10px;
        }

        .event-date { font-weight: 800; font-size: 1.2rem; color: var(--point-red); display: block; margin-bottom: 5px; }
        .event-loc { font-size: 1rem; color: #333; font-weight: 600; }

        .action-btn {
            background: var(--point-red);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .insta-btn {
            background: white;
            color: var(--insta-color);
            border: 2px solid var(--insta-color);
        }

        .insta-btn:hover {
            background: var(--insta-color);
            color: white;
        }

        .progress-bar { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 30px; overflow: hidden; }
        .progress { height: 100%; background: var(--point-green); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div id="test-container">
    <div id="start-screen">
        <div class="title">차로 알아보는 파티 심리 테스트</div>
        <div class="subtitle">나는 어떤 파티 스타일을 가지고 있을까요?<br>취향에 맞는 '차(Tea)'와 함께 알아보세요!</div>
        <button class="action-btn" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="question-section" style="display: none;">
        <div class="progress-bar"><div class="progress" id="progress"></div></div>
        <div id="questions"></div>
    </div>

    <div id="result-container" style="display: none;">
        <div class="brand-label">Chat, Tea, Party</div>
        <div class="title">YOUR PARTY CHARACTER</div>
        <div id="result-tea" class="result-tea"></div>
        <div id="result-desc" class="result-desc"></div>
        
        <div class="event-announcement">
            <span class="event-date">📅 4월 3일, 술 없는 파티가 열립니다!</span>
            <span class="event-loc">📍 장소: 효자도잉</span>
            <p style="margin-top:10px; font-size:0.9rem;">당신의 캐릭터에 맞는 차를 직접 만나보세요!</p>
        </div>

        <button class="action-btn" onclick="goToReservation()">챗, 차, 파티 예약하기</button>
        <button class="action-btn insta-btn" onclick="goToInstagram()">
            <i class="fab fa-instagram"></i> 효자도잉 인스타그램 구경하기
        </button>
    </div>
</div>

<script>
    const questions = [
        { q: "파티 입구에서 들리는 신나는 음악 소리!", a: [{ text: "오예! 리듬 타며 화려하게 입장!", scores: ['peach', 'hibiscus'] }, { text: "분위기 좀 살피고 천천히..", scores: ['green', 'rooibos'] }] },
        { q: "오늘 파티에 온 목적은 무엇인가요?", a: [{ text: "새로운 사람들과의 스릴 넘치는 Chat!", scores: ['lemon', 'hibiscus'] }, { text: "진솔하고 깊이 있는 소수의 대화", scores: ['rooibos', 'matcha'] }] },
        { q: "파티 스낵 테이블에서 손이 가장 먼저 향하는 곳은?", a: [{ text: "화려한 토팅의 도넛이나 컵케이크!", scores: ['peach', 'hibiscus', 'lemon'] }, { text: "담백한 크래커나 정갈한 견과류", scores: ['green', 'rooibos', 'matcha'] }] },
        { q: "파티 게임이 시작됐을 때 당신의 모습은?", a: [{ text: "내가 빠질 수 없지! 게임의 중심", scores: ['hibiscus', 'lemon'] }, { text: "박수 치며 응원하는 든든한 관객", scores: ['rooibos', 'green'] }] },
        { q: "대화 중 의견 차이가 생겼을 때 나의 태도는?", a: [{ text: "생각을 분명하고 쿨하게 전달", scores: ['matcha', 'green'] }, { text: "부드럽게 중재하며 대화 지속", scores: ['peach', 'rooibos'] }] },
        { q: "파티가 끝난 후, 가장 기억에 남는 것은?", a: [{ text: "내가 주인공이었던 짜릿한 순간", scores: ['peach', 'hibiscus'] }, { text: "나눈 대화의 따뜻한 여운들", scores: ['rooibos', 'lemon'] }] }
    ];

    const results = {
        peach: { name: "피치 우롱티", desc: "당신은 파티장에 들어서자마자 시선을 사로잡는 프롬 퀸/킹! 화려하고 기분 좋은 복숭아 향처럼 웃음소리가 끊이지 않아요." },
        hibiscus: { name: "히비스커스", desc: "강렬한 붉은빛처럼 파티의 열기를 주도하는 핫 가이/걸! 톡톡 튀는 성격으로 분위기를 순식간에 달궈놓는 에너자이저예요." },
        lemon: { name: "레몬밤 티", desc: "상큼한 레몬향처럼 주변을 환하게 밝히는 스마일 메이커! 누구와도 편하게 대화하며 긴장을 풀어주는 비타민 같은 존재예요." },
        matcha: { name: "말차 (Matcha)", desc: "자신만의 색깔이 뚜렷한 힙한 트렌드 세터! 남들과는 다른 독특한 취향과 깊이 있는 매력을 가진 숨은 멋쟁이예요." },
        rooibos: { name: "루이보스", desc: "밤새 마셔도 편안한 루이보스 같은 다정한 호스트! 모두를 세심하게 챙기며 깊은 대화의 장을 만드는 따뜻한 사람이에요." },
        green: { name: "녹차 (Green Tea)", desc: "깔끔하고 담백한 시크 미니멀리스트! 소란스러움 속에서도 중심을 지키며 여유롭게 파티를 즐길 줄 아는 멋쟁이예요." }
    };

    let currentIdx = 0;
    let totalScores = { peach: 0, hibiscus: 0, lemon: 0, matcha: 0, rooibos: 0, green: 0 };

    function startTest() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('question-section').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const qSection = document.getElementById('questions');
        qSection.innerHTML = '';
        const qData = questions[currentIdx];
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = qData.q;
        qSection.appendChild(qText);
        
        qData.a.forEach(answer => {
            const btn = document.createElement('button');
            btn.className = 'answer-btn';
            btn.innerText = answer.text;
            btn.onclick = () => selectAnswer(answer.scores);
            qSection.appendChild(btn);
        });
        document.getElementById('progress').style.width = ((currentIdx / questions.length) * 100) + '%';
    }

    function selectAnswer(scores) {
        scores.forEach(id => totalScores[id]++);
        currentIdx++;
        if (currentIdx < questions.length) showQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('question-section').style.display = 'none';
        document.getElementById('result-container').style.display = 'block';
        const winner = Object.keys(totalScores).reduce((a, b) => totalScores[a] > totalScores[b] ? a : b);
        document.getElementById('result-tea').innerText = results[winner].name;
        document.getElementById('result-desc').innerText = results[winner].desc;
    }

    function goToReservation() {
        alert('4월 3일 파티 예약 페이지로 이동합니다!');
	window.location.href = '';
    }

    function goToInstagram() {
        alert('효자도잉 인스타그램 페이지로 이동합니다!');
        window.location.href = 'https://www.instagram.com/hyojadoing?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==';
    }
</script>

</body>
</html>
